name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    strategy:
      matrix:
        python-version: ["3.11", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile
        run: python -m compileall -q src/shbr tests
      - name: Unit and privacy contract tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v
      - name: CLI smoke test
        env:
          PYTHONPATH: src
        run: |
          python -m shbr --help
          python -m shbr doctor --json

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install build
      - run: python -m build --wheel

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build native menu-bar app
        working-directory: apps/menubar-macos
        run: swift build -c release
