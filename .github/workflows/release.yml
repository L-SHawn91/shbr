name: GitHub Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install build
      - name: Verify tag matches package version
        run: |
          VERSION=$(python -c 'import pathlib,re; text=pathlib.Path("src/shbr/__init__.py").read_text(); print(re.search(r"^__version__ = \"([^\"]+)\"", text, re.M).group(1))')
          test "$GITHUB_REF_NAME" = "v$VERSION"
      - run: python -m build --wheel
      - name: Create checksum
        run: (cd dist && sha256sum -- *.whl) > SHA256SUMS
      - name: Create release with wheel
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.whl SHA256SUMS --generate-notes --verify-tag
